<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation &amp; JO System — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #0A0A0A; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(232,21,27,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(232,21,27,0.04) 1px, transparent 1px);
  background-size: 48px 48px; animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift { from { background-position: 0 0; } to { background-position: 48px 48px; } }
.bg-glow {
  position: fixed; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(232,21,27,0.12) 0%, transparent 70%);
  top: -100px; left: -100px; z-index: 0; animation: blobFloat 8s ease-in-out infinite;
}
@keyframes blobFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,40px) scale(1.1); } }
.login-card {
  position: relative; z-index: 10; background: #fff;
  width: 100%; max-width: 400px; border-radius: 2px; overflow: hidden;
  animation: cardRise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  box-shadow: 0 0 0 1px rgba(232,21,27,0.15), 0 32px 80px rgba(0,0,0,0.6);
}
@keyframes cardRise { from { opacity:0; transform:translateY(32px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
.accent-bar { height: 4px; background: #E8151B; }
.brand-strip { background: #0A0A0A; padding: 28px 36px 24px; display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: #E8151B; display: flex; align-items: center; justify-content: center; border-radius: 2px; flex-shrink: 0; }
.logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.05em; color: #fff; }
.logo-slash { color: #E8151B; }
.brand-sub { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-top: 2px; }
.form-area { padding: 32px 36px 36px; }
.field-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #666; display: block; margin-bottom: 6px; }
.field-input { width: 100%; background: #fff; border: 1px solid #E0E0E0; border-radius: 2px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #0A0A0A; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.field-input:focus { border-color: #E8151B; box-shadow: 0 0 0 2px rgba(232,21,27,0.15); }
.field-input::placeholder { color: #CCC; }
.btn-login { width: 100%; padding: 13px; background: #E8151B; border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: white; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.15s; margin-top: 24px; }
.btn-login:hover { background: #B00E12; }
.btn-login:disabled { background: #CCC; cursor: not-allowed; }
.error-msg {
  background: #FFF0F0; border: 1px solid #FFCCCC; border-radius: 2px;
  padding: 12px 14px; font-size: 12px; color: #CC1015;
  display: flex; gap: 8px; align-items: flex-start; margin-bottom: 20px;
  animation: shakeIn 0.35s ease both;
}
@keyframes shakeIn { 0% { transform:translateX(-6px);opacity:0; } 40% { transform:translateX(4px); } 70% { transform:translateX(-2px); } 100% { transform:translateX(0);opacity:1; } }
.spinner {
  width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.12);
  border-top-color: #E8151B; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.card-footer { background: #F9F9F9; border-top: 1px solid #F0F0F0; padding: 14px 36px; font-size: 11px; color: #AAA; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-card">
  <div class="accent-bar"></div>
  <div class="brand-strip">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M3 7h18v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2z"/></svg>
    </div>
    <div>
      <div class="logo-text">Quotation &amp; JO<span class="logo-slash"> System</span></div>
      <div class="brand-sub">Ormoc Printshoppe</div>
    </div>
  </div>

  <div class="form-area" id="formArea">
    <div style="margin-bottom:24px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:#0A0A0A;line-height:1;">STAFF ACCESS</div>
      <div style="font-size:12px;color:#999;margin-top:4px;">Enter your Google email to continue.</div>
    </div>

    <div id="errorBox" style="display:none;" class="error-msg">
      <span style="margin-top:1px;">⚠</span>
      <span id="errorText">Email not authorized.</span>
    </div>

    <div>
      <label class="field-label">Google Email</label>
      <input class="field-input" id="f_email" type="email" placeholder="yourname@gmail.com" autocomplete="email" inputmode="email" onkeydown="if(event.key==='Enter')doLogin();">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">SIGN IN →</button>
  </div>

  <div class="card-footer">© Quotation &amp; JO System · Ormoc Printshoppe</div>
</div>

<input type="hidden" id="app-url" value="<?= appUrl ?>">

<script>
const APP_URL = document.getElementById('app-url').value;

function showError(msg) {
  const box = document.getElementById('errorBox');
  document.getElementById('errorText').textContent = msg;
  box.style.display = 'flex';
  box.style.animation = 'none';
  requestAnimationFrame(() => { box.style.animation = ''; });
  const btn = document.getElementById('loginBtn');
  if (btn) { btn.disabled = false; btn.textContent = 'SIGN IN →'; }
}

function doLogin() {
  const email = (document.getElementById('f_email').value || '').trim();
  if (!email) { showError('Please enter your email.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '⏳ SIGNING IN...';
  document.getElementById('errorBox').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(result) {
      if (!result || !result.success) {
        showError((result && result.message) || 'Email not authorized. Contact your administrator.');
        return;
      }
      const page = (result.role === 'sales' || result.role === 'staff') ? 'index' : 'dashboard';
      document.getElementById('formArea').innerHTML = `
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:40px;margin-bottom:12px;">✅</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.05em;margin-bottom:6px;">Login Successful!</div>
          <div style="font-size:12px;color:#888;margin-bottom:24px;">Welcome, <strong>${result.name || result.username}</strong></div>
          <a href="${APP_URL}?page=${page}&token=${encodeURIComponent(result.token)}" target="_top"
             style="display:inline-block;background:#E8151B;color:white;text-decoration:none;padding:13px 32px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">
            ENTER SYSTEM →
          </a>
        </div>`;
    })
    .withFailureHandler(function(err) {
      showError('Server error: ' + (err && err.message ? err.message : 'Please try again.'));
    })
    .loginByEmail(email);
}
</script>
</body>
</html>
