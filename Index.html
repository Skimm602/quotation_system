<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotation System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: '#E8151B', 'brand-dark': '#B00E12', 'brand-dim': '#FF4A4F',
          ink: '#0A0A0A', 'ink-soft': '#1A1A1A', 'ink-muted': '#2C2C2C',
          chalk: '#FFFFFF', 'chalk-off': '#F5F5F5', 'chalk-dim': '#E0E0E0', 'chalk-hint': '#999999',
        },
        fontFamily: { display: ['Bebas Neue', 'sans-serif'], body: ['DM Sans', 'sans-serif'] },
      }
    }
  }
  </script>
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #FFFFFF; color: #0A0A0A; min-height: 100vh; }
  .topnav { background: #FFFFFF; border-bottom: 1px solid #E5E5E5; position: sticky; top: 0; z-index: 100; }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.05em; color: #0A0A0A; }
  .logo-slash { color: #E8151B; }
  .step-circle { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; border: 2px solid #E0E0E0; color: #999; transition: all 0.25s; background: #F5F5F5; cursor: pointer; flex-shrink: 0; }
  .step-circle.done { background: #E8151B; border-color: #E8151B; color: white; }
  .step-circle.active { background: white; border-color: white; color: #0A0A0A; box-shadow: 0 0 0 4px rgba(232,21,27,0.3); }
  .step-line { height: 1px; flex: 1; background: #E0E0E0; transition: background 0.25s; }
  .step-line.done { background: #E8151B; }
  .card { background: #FFFFFF; border: 1px solid #E5E5E5; border-radius: 4px; overflow: hidden; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .card-header-bar { background: #E8151B; height: 4px; width: 100%; }
  .field-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #666; display: block; margin-bottom: 6px; }
  .field-input { width: 100%; background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 3px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #0A0A0A; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .field-input:focus { border-color: #E8151B; box-shadow: 0 0 0 2px rgba(232,21,27,0.2); }
  .field-input::placeholder { color: #BBB; }
  select.field-input option { background: #F5F5F5; }
  textarea.field-input { min-height: 80px; resize: vertical; }
  .computed-box { background: linear-gradient(135deg, #FFF0F0, #FFF8F8); border: 1px solid #FFCCCC; border-radius: 3px; padding: 16px 20px; }
  .rate-pill { background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 3px; padding: 10px 14px; font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .rate-pill strong { color: #E8151B; }
  .info-box { background: #FFF5F5; border: 1px solid #FFCCCC; border-radius: 3px; padding: 12px 14px; font-size: 13px; color: #CC1015; display: flex; gap: 10px; align-items: flex-start; margin-top: 8px; }
  .info-box-blue { background: #F0F4FF; border: 1px solid #C5D3FF; border-radius: 3px; padding: 12px 14px; font-size: 13px; color: #2244AA; display: flex; gap: 10px; align-items: flex-start; margin-top: 8px; }
  .mount-card { border: 1px solid #E0E0E0; border-radius: 3px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 12px; }
  .mount-card:hover { border-color: #E8151B; background: #FFF8F8; }
  .mount-card.selected { border-color: #E8151B; background: #FFF0F0; box-shadow: 0 0 0 2px rgba(232,21,27,0.15); }
  .mount-card.quotation { border-style: dashed; }
  .mount-card input[type=radio] { accent-color: #E8151B; margin-top: 3px; flex-shrink: 0; }
  .complexity-card { border: 1px solid #E0E0E0; border-radius: 3px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; }
  .complexity-card:hover { border-color: #E8151B; background: #FFF8F8; }
  .complexity-card.checked { border-color: #E8151B; background: #FFF5F5; }
  .complexity-card input[type=checkbox] { accent-color: #E8151B; margin-top: 3px; flex-shrink: 0; }
  .q-table { width: 100%; border-collapse: collapse; }
  .q-table tr { border-bottom: 1px solid #F0F0F0; }
  .q-table tr:last-child { border: none; }
  .q-table td { padding: 10px 0; font-size: 14px; color: #666; }
  .q-table td:last-child { text-align: right; color: #0A0A0A; font-weight: 500; }
  .q-table .sec-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #BBB; font-weight: 700; padding-top: 18px; }
  .q-table .total-row td { font-size: 20px; font-weight: 700; color: #E8151B; padding-top: 16px; border-top: 2px solid #E8151B; }
  .q-table .total-row td:last-child { color: #E8151B; }
  .q-table .sub-row td { font-size: 13px; color: #777; padding-top: 6px; }
  .btn-ghost { padding: 10px 22px; border: 1px solid #E0E0E0; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: #888; background: transparent; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; letter-spacing: 0.02em; }
  .btn-ghost:hover { border-color: #999; color: #333; }
  .btn-primary { padding: 10px 26px; background: #E8151B; border: 1px solid #FFCCCC; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: white; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
  .btn-primary:hover { background: #B00E12; border-color: #B00E12; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-save { padding: 11px 28px; background: white; border: 1px solid #333; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: #0A0A0A; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  .btn-save:hover { background: #E8151B; border-color: #E8151B; color: white; }
  .btn-save.loading { opacity: 0.6; pointer-events: none; }
  .toast { position: fixed; bottom: 28px; right: 28px; background: #0A0A0A; border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 3px; font-size: 13px; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 10px; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: #0A2A1A; border-color: #1A6A3A; }
  .toast.error   { background: #1A0000; border-color: #E8151B; }
  .auto-tag { display: inline-flex; align-items: center; gap: 4px; background: #1A0000; color: #E8151B; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid #FFCCCC; margin-left: 8px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.05em; color: #0A0A0A; line-height: 1; }
  .section-title span { color: #E8151B; }
  .quote-client-box { background: #FFFFFF; border: 1px solid #E0E0E0; border-left: 3px solid #E8151B; padding: 16px 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
  .surcharge-badge { display: inline-block; background: #FFF0F0; border: 1px solid #FFCCCC; color: #E8151B; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 2px; margin-left: 6px; }
  .transport-location-box { background: #FFFBF0; border: 1px solid #FFE0A0; border-radius: 3px; padding: 12px 14px; margin-top: 10px; animation: fadeUp 0.2s ease both; }
  .signage-option:hover { background: #FFF5F5 !important; }
  @media print {
    .topnav, #stepper-wrap, .card-footer-bar, .toast, .page-title-area { display: none !important; }
    body { background: white; }
    .card { border: 1px solid #ddd; }
  }
  @media (max-width: 600px) {
    .fields-2col { grid-template-columns: 1fr !important; }
  }
  </style>
  </head>
  <body>

  <!-- NAV -->
  <nav class="topnav">
    <div class="max-w-4xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 bg-brand flex items-center justify-center rounded-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M3 7h18v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2z"/></svg>
        </div>
        <span class="logo-text">Quotation</span><span> System</span>
      </div>
      <div class="flex gap-2">
        <button class="btn-ghost text-xs" onclick="resetForm()">NEW QUOTE</button>
        <button class="btn-ghost text-xs" onclick="goToDashboard()" style="border-color:#0A0A0A;color:#0A0A0A;">← DASHBOARD</button>
        <button class="btn-primary text-xs" onclick="viewQuotations()">VIEW RECORDS</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="relative z-10 max-w-4xl mx-auto px-6 py-10 pb-20">
    <div class="page-title-area mb-8">
      <div class="section-title">NEW SIGNAGE <span>QUOTATION</span></div>
      <p class="text-sm mt-1 tracking-wide" style="color:#999;">Complete each step to generate a client quotation.</p>
    </div>
    <div id="stepper-wrap" class="mb-6 bg-gray-50 border border-gray-200 rounded-sm p-5 flex items-center gap-2 overflow-x-auto"></div>
    <div class="card" id="formCard">
      <div class="card-header-bar"></div>
      <div class="px-7 py-5 border-b border-gray-100 flex items-center gap-4" id="cardHeader"></div>
      <div class="px-7 py-7" id="cardBody"></div>
      <div class="card-footer-bar px-7 py-5 border-t border-gray-100 flex justify-between items-center bg-gray-50" id="cardFooter"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- GAS injects token and appUrl at serve time -->
  <input type="hidden" id="server-token" value="<?= injectedToken ?>">
  <input type="hidden" id="app-url"      value="<?= appUrl ?>">
  <input type="hidden" id="server-user"  value="<?= userName ?>">

  <script>
  // --- TOKEN ----------------------------------------------------------------
  const SERVER_TOKEN = (document.getElementById('server-token')||{}).value || '';
  const APP_URL      = (document.getElementById('app-url')||{}).value || '';

  function goToDashboard() {
    if (SERVER_TOKEN && APP_URL) {
      window.top.location.href = APP_URL + '?page=dashboard&token=' + encodeURIComponent(SERVER_TOKEN);
    }
  }

  // --- STATE ----------------------------------------------------------------
  let step = 0;
  const d = {
    clientName:'', contact:'', email:'', address:'', delivery:'',
    signageType:'', lighting:'None', material:'Standard', typeNotes:'',
    width:'', height:'',
    mounting:'', installNotes:'',
    selectedComplexity: [],
    designService:'No', artSpecs:'', fileFormat:'None',
    taxType: 'non-vat',
  };

  let RATES        = {};
  let MIN_CHARGE   = {};
  let MIN_AREA     = {};
  let DESIGN_FEE   = 800;
  let PRODUCTS     = [];
  let MOUNT_OPTIONS      = [];
  let COMPLEXITY_OPTIONS = [];
  let SECTION4           = { design:[], rush:[], electrical:[], transport:[] };

  // Section 4 add-on state
  const addons = {
    designService:    '',
    designFeeAmt:     0,
    rushOption:       '',
    rushFeeAmt:       0,
    selectedElec:     [],
    elecFeeAmt:       0,
    transport:        '',
    transportFeeAmt:  0,
    transportLocation: '',   // ← NEW: specific location within the cluster
    wiringMeters:     0,
  };

  // --- CALCULATIONS ---------------------------------------------------------
  function sqft()  { return (parseFloat(d.width)||0) * (parseFloat(d.height)||0); }
  function billableSqft() { return sqft(); }
  function base()  {
    const sf   = sqft();
    const rate = RATES[d.signageType]||0;
    const mc   = MIN_CHARGE[d.signageType]||0;
    return Math.max(sf * rate, mc);
  }
  function mountFee() {
    const opt = MOUNT_OPTIONS.find(m => m.label === d.mounting);
    return (!opt || opt.isQuotation) ? 0 : (opt.fee || 0);
  }
  function complexitySurcharge() {
    let total = 0;
    (d.selectedComplexity||[]).forEach(c => {
      if (c.type === 'percent') total += base() * (c.pct/100);
      else total += c.flat;
    });
    return total;
  }
  function designFeeAmt() { return d.designService === 'Yes' ? DESIGN_FEE : 0; }
  function addonTotal()   { return addons.designFeeAmt + addons.rushFeeAmt + addons.elecFeeAmt + addons.transportFeeAmt; }
  const VAT = 0.12;
  function subtotal() { return base() + mountFee() + complexitySurcharge() + designFeeAmt() + addonTotal(); }
  function taxAmt()   { const s=subtotal(); return (d.taxType||'non-vat')==='vat-exclusive'?s*VAT:(d.taxType||'non-vat')==='vat-inclusive'?s-s/(1+VAT):0; }
  function total()    { return (d.taxType||'non-vat')==='vat-exclusive'?subtotal()*(1+VAT):subtotal(); }
  function dp()       { return total() * 0.5; }
  function bal()      { return total() - dp(); }

  function taxToggleHtml() {
    var opts=[{key:'non-vat',label:'Non-VAT'},{key:'vat-inclusive',label:'VAT Incl. 12%'},{key:'vat-exclusive',label:'VAT Excl. 12%'}];
    var tx=d.taxType||'non-vat';
    var btns=opts.map(function(o){
      var a=tx===o.key;
      var border=a?'#E8151B':'#E0E0E0';
      var bg=a?'#E8151B':'#FAFAFA';
      var clr=a?'#fff':'#888';
      var fw=a?'700':'500';
      return '<button onclick="setTaxType(\''+o.key+'\')" style="padding:6px 14px;border:1px solid '+border+';border-radius:3px;font-size:12px;font-weight:'+fw+';cursor:pointer;background:'+bg+';color:'+clr+';transition:all .15s;">'+o.label+'</button>';
    }).join('');
    return '<tr><td colspan="2" style="padding:12px 0 6px;"><div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#BBB;margin-bottom:8px;">TAX</div><div style="display:flex;gap:6px;flex-wrap:wrap;">'+btns+'</div></td></tr>';
  }
  function setTaxType(key) { d.taxType=key; renderBody(); }
  function php(n)   { return '₱' + (n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function esc(s)   { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function v(id)    { return (document.getElementById(id)||{}).value || ''; }

  // --- SIGNAGE TYPE GROUPING -------------------------------------------------
  const GROUP_ORDER = [
    'Single Face Signage (Metal Frame)',
    'Double Face Signage (Metal Frame)',
    'Other',
  ];

  function buildGrouped() {
    const grouped = {};
    GROUP_ORDER.forEach(g => { grouped[g] = []; });
    PRODUCTS.forEach(p => {
      const g = p.section || 'Other';
      if (!grouped[g]) grouped[g] = [];
      grouped[g].push(p);
    });
    return grouped;
  }

  // --- SIGNAGE DROPDOWN FUNCTIONS -------------------------------------------
  function showSignageDropdown() {
    const dd = document.getElementById('signage-dropdown');
    if (dd) dd.style.display = 'block';
  }

  function filterSignageTypes(query) {
    const dd = document.getElementById('signage-dropdown');
    if (!dd) return;
    dd.style.display = 'block';
    const q = query.toLowerCase();
    dd.querySelectorAll('.signage-option').forEach(el => {
      const name = (el.dataset.value || '').toLowerCase();
      el.style.display = name.includes(q) ? '' : 'none';
    });
    dd.querySelectorAll('.signage-group').forEach(group => {
      const visible = Array.from(group.querySelectorAll('.signage-option')).some(function(o) { return o.style.display !== 'none'; });
      group.style.display = visible ? '' : 'none';
    });
  }

  // Material auto-derives from the signage type:
  //   non-lighted (single or double)  → Premium Print
  //   lighted     (single or double)  → UV Print
  //   anything else                   → Standard
  function autoMaterial(name) {
    const t = String(name || '').toLowerCase();
    if (/non[\s-]*lighted/.test(t)) return 'Premium Print';
    if (/lighted/.test(t))          return 'UV Print';
    return 'Standard';
  }

  function selectSignageType(name, rate, minCharge, minArea) {
    d.signageType = name;
    d.material    = autoMaterial(name);
    RATES[name]     = rate;
    MIN_CHARGE[name]= minCharge;
    MIN_AREA[name]  = minArea;

    const sb = document.getElementById('type-search');
    if (sb) sb.value = name;

    const dd = document.getElementById('signage-dropdown');
    if (dd) dd.style.display = 'none';

    const pc = document.getElementById('product-card');
    if (pc) {
      pc.innerHTML = `
        <div style="margin-top:10px;background:#F9F9F9;border:1px solid #E5E5E5;border-left:3px solid #E8151B;border-radius:3px;padding:12px 16px;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.05em;color:#0A0A0A;margin-bottom:8px;">${esc(name)}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div>
              <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#BBB;margin-bottom:2px;">Rate / sq ft</div>
              <div style="font-size:18px;font-weight:700;color:#E8151B;font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;">${php(rate)}</div>
            </div>
            ${minCharge ? `<div><div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#BBB;margin-bottom:2px;">Min. Charge</div><div style="font-size:18px;font-weight:700;color:#0A0A0A;font-family:'Bebas Neue',sans-serif;">${php(minCharge)}</div></div>` : ''}
            ${minArea   ? `<div><div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#BBB;margin-bottom:2px;">Min. Area</div><div style="font-size:18px;font-weight:700;color:#0A0A0A;font-family:'Bebas Neue',sans-serif;">${minArea} sq ft</div></div>` : ''}
          </div>
        </div>`;
    }
    document.querySelectorAll('.signage-option').forEach(el => {
      const isSelected = el.dataset.value === name;
      el.style.background = isSelected ? '#FFF0F0' : '';
      el.querySelector('div').style.color = isSelected ? '#E8151B' : '#0A0A0A';
      el.querySelector('div').style.fontWeight = isSelected ? '700' : '500';
    });
    // Refresh the step so the auto-filled Material display updates.
    renderBody();
  }

  // --- STEPS ----------------------------------------------------------------
  const STEPS = [
    { label:'Client Info',     sub:'Name, contact & delivery location' },
    { label:'Signage Type',    sub:'Type & material' },
    { label:'Dimensions',      sub:'Width × height → sq ft auto-computed' },
    { label:'Mounting',        sub:'Live mounting options from pricelist' },
    { label:'Add-ons',         sub:'Design, rush, electrical & transport fees' },
    { label:'Design',          sub:'Artwork specs & service details' },
    { label:'Quotation',       sub:'Full breakdown & downpayment' },
  ];

  function renderStepper() {
    const el = document.getElementById('stepper-wrap');
    el.innerHTML = '';
    STEPS.forEach((s, i) => {
      const state = i < step ? 'done' : i === step ? 'active' : '';
      el.innerHTML += `
        <div class="flex flex-col items-center gap-1 cursor-pointer min-w-fit" onclick="goTo(${i})">
          <div class="step-circle ${state}">${i < step ? '✓' : i+1}</div>
          <span style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:${i===step?'#E8151B':i<step?'#999':'#BBB'};white-space:nowrap;">${s.label}</span>
        </div>
        ${i < STEPS.length-1 ? `<div class="step-line flex-1 ${i < step ? 'done' : ''}" style="margin-bottom:18px;"></div>` : ''}
      `;
    });
  }

  function goTo(i) { if(i < step) { save(); step=i; render(); } }

  function renderHeader() {
    const s = STEPS[step];
    document.getElementById('cardHeader').innerHTML = `
      <div style="width:42px;height:42px;background:#E8151B;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:white;letter-spacing:0.05em;">${step+1}</span>
      </div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:#0A0A0A;line-height:1.1;">${s.label.toUpperCase()}</div>
        <div style="font-size:12px;color:#555;margin-top:2px;">${s.sub}</div>
      </div>`;
  }

  function renderBody() {
    const el = document.getElementById('cardBody');

    // -- STEP 0 --------------------------------------------------------------
    if (step === 0) {
      el.innerHTML = `
        <div class="grid gap-5" style="grid-template-columns:1fr 1fr;">
          <div style="grid-column:1/-1;" class="flex flex-col gap-1">
            <label class="field-label">Full Name</label>
            <input class="field-input" id="f_name" value="${esc(d.clientName)}" placeholder="Juan dela Cruz">
          </div>
          <div class="flex flex-col gap-1">
            <label class="field-label">Contact Number</label>
            <input class="field-input" id="f_contact" value="${esc(d.contact)}" placeholder="09XX XXX XXXX" maxlength="13" oninput="formatPhone(this)" onkeypress="return event.charCode>=48&&event.charCode<=57">
          </div>
          <div class="flex flex-col gap-1">
            <label class="field-label">Email Address <span style="color:#BBB;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div><div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#BBB;margin-bottom:2px;">Rate / sq ft</div>

        </div>

    else if (step === 3) {
      const mountCards = MOUNT_OPTIONS.length

            const isSelected = d.mounting === m.label;
            return `<label class="mount-card ${isSelected?'selected':''} ${m.isQuotation?'quotation':''}" onclick="selectMount(${JSON.stringify(m.label).split('"').join('&quot;')})">

              <div class="transport-location-box" style="background:#F0FFF4;border-color:#A7F3D0;">

                  <input type="radio" name="design_svc" ${addons.designService===d4.label?'checked':''}>

  // --- PHONE FORMAT ---------------------------------------------------------
  function formatPhone(input) {
    let digits = input.value.replace(/\D/g, '');
    if (digits.length > 11) digits = digits.slice(0, 11);
    let formatted = digits;
    if (digits.length > 4 && digits.length <= 7) {
      formatted = digits.slice(0,4) + ' ' + digits.slice(4);
    } else if (digits.length > 7) {
      formatted = digits.slice(0,4) + ' ' + digits.slice(4,7) + ' ' + digits.slice(7);
    }
    input.value = formatted;
    d.contact = formatted;
  }

  function toFeet(val, unit) {
    const n = parseFloat(val) || 0;
    if (unit === 'cm') return n / 30.48;
    if (unit === 'm')  return n * 3.28084;
    return n;
  }

  function liveCompute() {
    d.rawWidth  = (document.getElementById('f_width')||{}).value  || d.rawWidth  || '';
    d.rawHeight = (document.getElementById('f_height')||{}).value || d.rawHeight || '';
    d.unit      = (document.getElementById('f_unit')||{}).value   || d.unit      || 'ft';

    d.width  = toFeet(d.rawWidth,  d.unit).toFixed(4);
    d.height = toFeet(d.rawHeight, d.unit).toFixed(4);

    const sf      = sqft();
    const billSf  = Math.max(sf, sf > 0 ? 10 : 0);
    const b       = base();
    const belowMin = sf > 0 && sf < 10;

    const sqEl  = document.getElementById('sqftVal');
    const dimEl = document.getElementById('dimLabel');
    const bsEl  = document.getElementById('baseVal');

    if (sqEl)  {
      sqEl.textContent = sf > 0 ? sf.toFixed(2) : '—';
      sqEl.style.color = belowMin ? '#CC6600' : '#E8151B';
    }
    if (dimEl) {
      const unit = d.unit || 'ft';
      dimEl.innerHTML = `${d.rawWidth||'?'} × ${d.rawHeight||'?'} ${unit}${sf>0&&unit!=='ft'?` <span style="color:#AAA;"> = ${parseFloat(d.width).toFixed(2)} × ${parseFloat(d.height).toFixed(2)} ft</span>`:''}`;
    }
    if (bsEl && d.signageType) bsEl.textContent = sf > 0 ? '= ' + php(b) : '';
  }

  function selectMount(label) {
    d.mounting = label; renderBody();
    if (document.getElementById('f_instnotes')) document.getElementById('f_instnotes').value = d.installNotes;
  }

  function toggleComplexity(index, cardEl) {
    const opt = COMPLEXITY_OPTIONS[index];
    if (!opt) return;
    const existing = (d.selectedComplexity||[]).findIndex(x => x.label === opt.label);
    if (existing >= 0) { d.selectedComplexity.splice(existing,1); cardEl.classList.remove('checked'); }
    else { if (!d.selectedComplexity) d.selectedComplexity=[]; d.selectedComplexity.push(opt); cardEl.classList.add('checked'); }
    const typenotes=(document.getElementById('f_typenotes')||{}).value;
    if (typenotes!==undefined) d.typeNotes=typenotes;
    renderBody();
  }

  // --- ADDON HANDLERS -------------------------------------------------------
  function selectDesignService(label, rate) {
    addons.designService = label;
    addons.designFeeAmt  = rate;
    renderBody();
  }

  function selectRush(label, pct, flat, fee) {
    addons.rushOption  = label;
    addons.rushFeeAmt  = fee;
    renderBody();
  }

  function toggleElec(index, cardEl) {
    const e4 = SECTION4.electrical[index];
    if (!e4) return;
    const existing = addons.selectedElec.findIndex(x => x.label === e4.label);
    if (existing >= 0) {
      addons.selectedElec.splice(existing, 1);
      cardEl.classList.remove('checked');
    } else {
      addons.selectedElec.push({ label: e4.label, flat: e4.flat || 0, perUnit: e4.perUnit, unitRate: e4.unitRate || 0 });
      cardEl.classList.add('checked');
    }
    calcElecTotal();
    renderBody();
  }

  function calcElecTotal() {
    let total = 0;
    addons.selectedElec.forEach(e => {
      if (e.perUnit) total += (addons.wiringMeters || 0) * (e.unitRate || 0);
      else total += e.flat || 0;
    });
    addons.elecFeeAmt = total;
  }

  function selectTransport(label, flat) {
    // Save current location input value before re-render
    const locInput = document.getElementById('transport_location_input');
    if (locInput) addons.transportLocation = locInput.value;

    // Reset location if switching to a different cluster
    if (addons.transport !== label) addons.transportLocation = '';

    addons.transport       = label;
    addons.transportFeeAmt = flat;
    renderBody();
  }

  function liveDesign() {
    d.designService = (document.getElementById('f_design')||{}).value || d.designService;
    renderBody();
  }

  function save() {
    if(step===0){ d.clientName=v('f_name'); d.contact=v('f_contact'); d.email=v('f_email'); d.address=v('f_address'); d.delivery=v('f_delivery'); d.dateNeeded=v('f_dateneeded'); }
    if(step===1){ d.signageType=v('type-search'); d.material=autoMaterial(d.signageType); d.typeNotes=v('f_typenotes'); }
    if(step===2){ 
      d.rawWidth  = v('f_width'); 
      d.rawHeight = v('f_height'); 
      d.unit      = v('f_unit') || 'ft';
      d.width     = toFeet(d.rawWidth,  d.unit).toFixed(4);
      d.height    = toFeet(d.rawHeight, d.unit).toFixed(4);
    }
    if(step===3){ d.installNotes=v('f_instnotes'); }
    if(step===4){
      // Save location input if visible
      const locInput = document.getElementById('transport_location_input');
      if (locInput) addons.transportLocation = locInput.value;
    }
    if(step===5){ d.designService=v('f_design'); d.artSpecs=v('f_artspecs'); d.fileFormat=v('f_fileformat'); }
  }

  function next() {
    save();

    if (step === 0) {
      const fields = [
        { id:'f_name',      val:d.clientName,  label:'Full Name' },
        { id:'f_contact',   val:d.contact,     label:'Contact Number' },
        { id:'f_address',   val:d.address,     label:'Address' },
        { id:'f_delivery',  val:d.delivery,    label:'Delivery Location' },
        { id:'f_dateneeded',val:d.dateNeeded,  label:'Date Needed' },
      ];
      fields.forEach(f => { const el=document.getElementById(f.id); if(el) el.style.borderColor=''; });
      const empty = fields.filter(f => !f.val.trim());
      if (empty.length) {
        empty.forEach(f => { const el=document.getElementById(f.id); if(el) el.style.borderColor='#E8151B'; });
        showToast('⚠ Please fill in: ' + empty.map(f=>f.label).join(', '), 'error');
        return;
      }
      const digits = d.contact.replace(/\D/g,'');
      if (digits.length !== 11) {
        const el = document.getElementById('f_contact');
        if (el) el.style.borderColor = '#E8151B';
        showToast('⚠ Contact number must be 11 digits (e.g. 09XX XXX XXXX).', 'error');
        return;
      }
    }

    if (step === 1) {
      if (!d.signageType) {
        const el = document.getElementById('type-search');
        if (el) el.style.borderColor = '#E8151B';
        showToast('⚠ Please select a Signage Type.', 'error');
        return;
      }
    }

    if (step === 2) {
      const w   = parseFloat(d.rawWidth)  || 0;
      const h   = parseFloat(d.rawHeight) || 0;
      const wEl = document.getElementById('f_width');
      const hEl = document.getElementById('f_height');
      if (wEl) wEl.style.borderColor = '';
      if (hEl) hEl.style.borderColor = '';

      if (!w && !h) {
        if (wEl) wEl.style.borderColor = '#E8151B';
        if (hEl) hEl.style.borderColor = '#E8151B';
        showToast('⚠ Please enter Width and Height.', 'error');
        return;
      }
      if (!w) {
        if (wEl) wEl.style.borderColor = '#E8151B';
        showToast('⚠ Please enter Width.', 'error');
        return;
      }
      if (!h) {
        if (hEl) hEl.style.borderColor = '#E8151B';
        showToast('⚠ Please enter Height.', 'error');
        return;
      }
      const sf = sqft();
      if (sf < 10) {
        if (wEl) wEl.style.borderColor = '#E8151B';
        if (hEl) hEl.style.borderColor = '#E8151B';
        showToast(`⚠ Minimum area is 10 sq ft. Current: ${sf.toFixed(2)} sq ft.`, 'error');
        return;
      }
    }

    if (step === 3) {
      if (!d.mounting) {
        showToast('⚠ Please select a Mounting Type.', 'error');
        return;
      }
    }

    if (step === 4) {
      if (!addons.transport) {
        showToast('⚠ Please select a Transport / Delivery option.', 'error');
        return;
      }
      // Require location for non-Ormoc clusters
      const isOrmoc = addons.transport === 'Ormoc City — all barangays';
      if (!isOrmoc && !addons.transportLocation.trim()) {
        const locInput = document.getElementById('transport_location_input');
        if (locInput) locInput.style.borderColor = '#E8151B';
        showToast('⚠ Please specify the delivery location / barangay for this cluster.', 'error');
        return;
      }
    }

    if (step < STEPS.length - 1) {
      step++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }
  function prev() { save(); if(step>0){ step--; render(); window.scrollTo({top:0,behavior:'smooth'}); } }

  function wrapMessengerText(specsText, clientName, scriptKey, salesName) {

      ? String(clientName).trim() : '[client name]';
    var sales = (salesName && String(salesName).trim()) ? String(salesName).trim() : '[Name of Sales Associate]';
    return s.opening.replace('{client}', c) + '\n\n' + specsText + '\n\n'
         + s.closing + '\n— ' + sales + ', Ormoc Printshoppe';

    if (addons.designFeeAmt>0)    lines.push('• Design & Artwork: ' + php(addons.designFeeAmt));
    if (addons.rushFeeAmt>0)      lines.push('• Rush fee: ' + php(addons.rushFeeAmt));
    if (addons.elecFeeAmt>0)      lines.push('• Electrical add-ons: ' + php(addons.elecFeeAmt));
    if (addons.transportFeeAmt>0) lines.push('• Transport fee: ' + php(addons.transportFeeAmt));
    if (tAmt>0)                   lines.push('• ' + (d.taxType==='vat-inclusive'?'VAT (12% incl.)':'VAT (12%)') + ': ' + php(tAmt));
    lines.push('');
    lines.push('💵 TOTAL: ' + php(t));
    lines.push('   Downpayment (50%): ' + php(dpv));
    lines.push('   Balance: ' + php(balv));
    return lines.join('\n');
  }
  function copyForMessenger() {
    const key   = (document.getElementById('msgScriptType')||{}).value || 'walkin';
    const sales = (document.getElementById('server-user')||{}).value || '';
    const text  = wrapMessengerText(buildMessengerText(), d.clientName, key, sales);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { showCopyToast(); }).catch(function() { fallbackCopy(text); });
    } else { fallbackCopy(text); }
  }
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopyToast();
  }
  function showCopyToast() {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = '📋 Copied! Paste it in Messenger.';
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
  }

  function saveToSheet() {
    const btn=document.getElementById('saveBtn');
    btn.classList.add('loading'); btn.textContent='⏳ SAVING...';
    const selMount=MOUNT_OPTIONS.find(m=>m.label===d.mounting);
    const payload = Object.assign({}, d, {
      sqft:                billableSqft().toFixed(2),
      actualSqft:          sqft().toFixed(2),
      unit:                d.unit || 'ft',
      rate:                RATES[d.signageType]||0,
      minCharge:           MIN_CHARGE[d.signageType]||0,
      minArea:             MIN_AREA[d.signageType]||0,
      baseAmount:          base(),
      mountFee:            mountFee(),
      complexitySurcharge: complexitySurcharge(),
      complexityLabels:    (d.selectedComplexity||[]).map(function(c){return c.label;}).join(', '),
      designFee:           designFeeAmt(),
      totalAmount:         total(),
      downpayment:         dp(),
      balance:             bal(),
      mountingIsQuotation: (selMount&&selMount.isQuotation)||false,
      quoteDate:           new Date().toISOString(),
      dateNeeded:          d.dateNeeded || '',
      salesStaff:          (document.getElementById('server-user')||{}).value || '',
      addonDesign:         addons.designService || '',
      addonDesignFee:      addons.designFeeAmt || 0,
      addonRush:           addons.rushOption || '',
      addonRushFee:        addons.rushFeeAmt || 0,
      addonElec:           addons.selectedElec.map(function(e){return e.label;}).join(', '),
      addonElecFee:        addons.elecFeeAmt || 0,
      addonTransport:      addons.transport || '',
      addonTransportLocation: addons.transportLocation || '',
      addonTransportFee:   addons.transportFeeAmt || 0,
      addonTotal:          addonTotal(),
      taxType:             d.taxType || 'non-vat',
      taxAmount:           taxAmt(),
    });
    google.script.run
      .withSuccessHandler(function(quoteNum) {
        showToast('✓ Saved — '+quoteNum,'success');
        btn.classList.remove('loading'); btn.textContent='✓ SAVED';
        btn.style.background='#0A2A1A'; btn.style.borderColor='#1A6A3A'; btn.style.color='#4AE89A';
      })
      .withFailureHandler(function(err) {
        showToast('⚠ '+err.message,'error');
        btn.classList.remove('loading'); btn.textContent='💾 SAVE QUOTATION';
      })
      .saveQuotation(payload);
  }

  function printQuote() { window.print(); }
  function viewQuotations() {
    google.script.run.withSuccessHandler(url=>window.open(url,'_blank')).getSheetUrl();
  }

  function showToast(msg,type='') {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>{t.className='toast '+type;},3500);
  }

// -- PAYMENT TERMS --
  let PAYMENT_TERMS = [];

  function loadPaymentTerms() {
    try {
      google.script.run
        .withSuccessHandler(function(terms) { 
          PAYMENT_TERMS = terms;
        })
        .withFailureHandler(function() {})
        .getPaymentTerms();
    } catch(e) {}
  }


  function loadPricing() {
    google.script.run
      .withSuccessHandler(function(pricing) {
        PRODUCTS           = pricing.products || [];
        RATES              = pricing.rates                || {};
        MIN_CHARGE         = pricing.minCharge            || {};
        MIN_AREA           = pricing.minArea              || {};
        MOUNT_OPTIONS      = pricing.mountingOptions      || [];
        COMPLEXITY_OPTIONS = pricing.complexitySurcharges || [];
        DESIGN_FEE         = pricing.designFee            || 800;
        SECTION4           = pricing.section4             || { design:[], rush:[], electrical:[], transport:[] };
        if (!addons.rushOption && SECTION4.rush.length) {
          addons.rushOption = SECTION4.rush[0].label;
          addons.rushFeeAmt = 0;
        }
        if (!d.mounting && MOUNT_OPTIONS.length) d.mounting=MOUNT_OPTIONS[0].label;
        render();
      })
      .withFailureHandler(function() {
        RATES={'Tarpaulin':25,'LED Box':120,'Acrylic':90};
        MIN_CHARGE={}; MIN_AREA={};
        MOUNT_OPTIONS=[
          {label:'Wall / Post — standard',fee:500,isQuotation:false,notes:'Ground level install'},
          {label:'Rooftop — low rise',fee:1500,isQuotation:false,notes:'Ladder access needed'},
          {label:'Rooftop — high rise (6F+)',fee:0,isQuotation:true,notes:'Site visit required'},
        ];
        COMPLEXITY_OPTIONS=[]; DESIGN_FEE=800;
        SECTION4 = {
          design: [
            { label: 'Basic layout / typographic design', rate: 500, notes: 'Simple text + logo arrangement' },
            { label: 'Custom graphic design', rate: 800, rateMax: 1500, notes: 'Illustrations, complex layout, branding' },
            { label: 'Design revision (after 2nd revision)', rate: 200, notes: 'First 2 revisions are FREE · ₱200/revision' },
            { label: 'File conversion / cleanup', rate: 300, notes: 'Low-res or unusable file → print-ready' },
          ],
          rush: [
            { label: 'No rush — standard lead time (5–7 days)', pct: 0, flat: 0, notes: '' },
            { label: 'Rush — 3 to 4 days', pct: 15, flat: 0, notes: 'Standard lead time is 5–7 working days' },
            { label: 'Rush — 1 to 2 days', pct: 25, flat: 0, notes: 'Subject to capacity. Confirm before ordering' },
            { label: 'Same-day production', pct: 40, flat: 0, notes: 'Confirm by 8 AM. Very limited slots only' },
            { label: 'After-hours / weekend work', pct: 0, flat: 500, notes: 'Per day · Overtime labor surcharge' },
          ],
          electrical: [
            { label: 'LED module upgrade (Samsung)', flat: 500 },
            { label: 'Wiring to power source (up to 5m)', flat: 500 },
            { label: 'Wiring beyond 5 meters (+₱100/meter)', flat: 0, perUnit: true, unitLabel: 'meters beyond 5m', unitRate: 100 },
            { label: 'Timer / automatic on-off switch', flat: 300, flatMax: 800 },
          ],
          transport: [
            { label: 'Ormoc City — all barangays', flat: 0, notes: 'FREE · Client pickup always FREE' },
            { label: 'Cluster B — 10 to 43 km', flat: 700, flatMax: 1500, notes: 'Merida, Albuera, Kananga, Isabel, Matag-ob' },
            { label: 'Cluster C — 44 to 80 km', flat: 2000, flatMax: 2500, notes: 'Baybay, Palompon, Naval (Biliran), Carigara' },
            { label: 'Cluster D — 81 to 130 km', flat: 3500, flatMax: 4500, notes: 'Tacloban (₱4,500), Palo, Maasin, Sogod' },
            { label: 'Cluster E — Samar Island', flat: 6000, flatMax: 7500, notes: 'Via San Juanico Bridge · full-day delivery' },
          ],
        };
        if (!addons.rushOption && SECTION4.rush.length) { addons.rushOption=SECTION4.rush[0].label; addons.rushFeeAmt=0; }
        if (!d.mounting) d.mounting=MOUNT_OPTIONS[0].label;
        render();
      })
      .getPricing();
  }

  try { loadPricing(); } catch(e) {
    console.error('loadPricing error, retrying in 1s:', e);
    setTimeout(function() { try { loadPricing(); } catch(e2) {} }, 1000);
  }
  try { loadPaymentTerms(); } catch(e) {}
  render();
  </script>
